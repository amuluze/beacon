name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: go vet
        run: |
          cd beacon  && go vet ./...
          cd ../collia && go vet ./...
          cd ../common && go vet ./...

  go-test:
    needs: go-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [beacon, collia, common]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: test ${{ matrix.module }}
        run: cd ${{ matrix.module }} && go test -race -count=1 -coverprofile=coverage.out ./...
      - name: upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.out

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beacon/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: beacon/web/package-lock.json
      - name: install dependencies
        run: npm ci
      - name: type check
        run: npm run ts
      - name: lint
        run: npm run lint || true  # lint errors are non-blocking pending cleanup
      - name: build
        run: npm run build

  docker-build:
    needs: go-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: build beacon image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: beacon/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
