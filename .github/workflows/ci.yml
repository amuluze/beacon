name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [amprobe, collia, common]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Test ${{ matrix.module }}
        working-directory: ./${{ matrix.module }}
        run: go test ./...

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: go-test
    strategy:
      matrix:
        module: [amprobe, collia, common]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Build ${{ matrix.module }}
        working-directory: ./${{ matrix.module }}
        run: go build ./...

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: amprobe/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./amprobe/web
        run: pnpm install
      - name: Lint
        working-directory: ./amprobe/web
        run: pnpm lint
      - name: Type check
        working-directory: ./amprobe/web
        run: pnpm ts
      - name: Build
        working-directory: ./amprobe/web
        run: pnpm build
      - name: Test
        working-directory: ./amprobe/web
        run: pnpm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker buildx build --platform linux/amd64 -f amprobe/Dockerfile .

  docs-check:
    name: Documentation Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .docs/ structure
        run: |
          test -f .docs/MANIFEST.yml
          test -f .docs/architecture.md
          test -f .docs/concepts/data-flow.md
          test -f .docs/deployment.md
          test -f .docs/api/routes.md
          test -f .docs/api/openapi.yml
          test -f .docs/modules/amprobe.md
          test -f .docs/modules/collia.md
          test -f .docs/modules/common.md
          test -f .docs/modules/amprobe-web.md
          echo "All required docs present."
