apiVersion: v1
kind: ConfigMap
metadata:
  name: amprobe-config
  namespace: amprobe
data:
  config.toml: |
    [Fiber]
    Host = "0.0.0.0"
    Port = 8000
    ShutdownTimeout = 30
    SeverHeader = "probe"
    AppName = "probe"
    Prefork = false

    [Control]
    Enable = true
    Address = ":17000"
    DefaultAgentID = "default"
    JoinToken = ""

    [Control.TLS]
    Enable = false
    CertDir = "/etc/amprobe/control-certs"
    ClientNames = []

    [Gorm]
    Debug = true
    DBType = "sqlite"
    MaxLifetime = 7200
    MaxOpenConns = 150
    MaxIdleConns = 50
    TablePrefix = "s_"
    EnableAutoMigrate = true

    [DB]
    Host = ""
    Port = ""
    User = ""
    Password = ""
    DBName = "/app/data/probe"
    SSLMode = ""

    [Log]
    Output = "/app/logs/probe.log"
    Level = "debug"
    Rotation = 1
    MaxAge = 7

    [Auth]
    Enable = true
    SigningMethod = "HS512"
    SigningKey = "amprobe"
    Expired = 7200
    RefreshExpired = 86400
    Prefix = "auth_"

    [Casbin]
    Enable = true
    Debug = false
    AutoLoad = true
    AutoLoadInternal = 60

    [Task]
    Interval = 15

    [AgentInstall]
    Enable = true
    Token = "change-me"
    PublicBaseURL = ""
    PackageDir = "/app/downloads/collia"
    ControlPort = 17000
    TLSEnable = true
    CertDir = "/etc/collia/certs"

    [InstallReport]
    Enable = false
    URL = "https://official.amprobe.amuluze.com/api/v1/install/report"
    InstallDir = "/data/amprobe"
    IDFile = "/app/data/install.id"
    Timeout = 5
