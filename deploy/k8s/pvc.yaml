apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: amprobe-data
  namespace: amprobe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: amprobe-logs
  namespace: amprobe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
