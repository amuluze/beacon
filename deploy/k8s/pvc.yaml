apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beacon-data
  namespace: beacon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beacon-logs
  namespace: beacon
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
