apiVersion: v1
kind: Secret
metadata:
  name: beacon-secrets
  namespace: beacon
type: Opaque
stringData:
  # ⚠️ 生产环境必须通过外部 secret management 替换这些默认值
  auth-signing-key: "REPLACE_WITH_STRONG_RANDOM_KEY"
  agent-install-token: "REPLACE_WITH_STRONG_RANDOM_TOKEN"
  control-join-token: "REPLACE_WITH_STRONG_RANDOM_TOKEN"
