version: '3.8'

services:
  amprobe:
    build:
      context: ..
      dockerfile: amprobe/Dockerfile
    container_name: beacon
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "17000:17000"
    volumes:
      - amprobe-data:/app/data
      - amprobe-logs:/app/logs
      - ../amprobe/configs:/app/configs:ro
    environment:
      - AMPROBE_AUTH_SIGNING_KEY=amprobe-dev
      - AMPROBE_AGENT_INSTALL_TOKEN=change-me-dev
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - amprobe-net

volumes:
  amprobe-data:
  amprobe-logs:

networks:
  amprobe-net:
    driver: bridge
