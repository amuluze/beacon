# Document manifest generated by /sdd doc update.
# It records the documentation entities expected by the project's SDD/doc workflow.
version: "3.0"

quality:
  warning_rules:
    - code: low_signal_description
      description: generated descriptions should name the concrete document purpose instead of generic placeholders
    - code: unmanaged_ai_entry
      description: CLAUDE-only local guidance should be promoted to AGENTS.md or migrated into .docs when it affects collaboration
    - code: stale_generated_doc
      description: generated .docs files outside the current target set should be archived, migrated, re-adopted or removed

docs:
  required:
    - path: api/routes.md
      min_lines: 20
      must_contain:
        - "## 范围"
      description: API route and handler signal index inferred from source registrations
    - path: api/openapi.yml
      min_lines: 20
      must_contain:
        - "openapi: 3.0.3"
        - "/health"
      description: OpenAPI 3.0 specification of the Beacon HTTP API surface
    - path: architecture.md
      min_lines: 50
      must_contain:
        - "## 架构概览"
        - "## 核心模块"
        - "## 职责边界"
      description: system architecture, runtime flow, module boundaries and dependency direction
    - path: concepts/data-flow.md
      min_lines: 25
      must_contain:
        - "## 请求生命周期"
        - "## 数据边界"
      description: request lifecycle, data ownership boundaries and cross-module flow
    - path: deployment.md
      min_lines: 30
      must_contain:
        - "## 环境要求"
        - "## 快速启动"
        - "## 配置说明"
      description: environment requirements, build commands, configuration policy and release checks
    - path: modules/beacon-web.md
      min_lines: 30
      must_contain:
        - "## 模块职责"
        - "## 职责边界"
        - "## 验证命令"
      description: beacon-web module responsibilities, implementation signals, exported-symbol hints, dependencies, state and validation
    - path: modules/beacon.md
      min_lines: 30
      must_contain:
        - "## 模块职责"
        - "## 职责边界"
        - "## 验证命令"
      description: beacon module responsibilities, implementation signals, exported-symbol hints, dependencies, state and validation
    - path: modules/collia.md
      min_lines: 30
      must_contain:
        - "## 模块职责"
        - "## 职责边界"
        - "## 验证命令"
      description: collia module responsibilities, implementation signals, exported-symbol hints, dependencies, state and validation
    - path: modules/common.md
      min_lines: 30
      must_contain:
        - "## 模块职责"
        - "## 职责边界"
        - "## 验证命令"
      description: common module responsibilities, implementation signals, exported-symbol hints, dependencies, state and validation
    - path: project-analysis.md
      min_lines: 40
      must_contain:
        - "## Documentation Coverage Model"
        - "## Update Guidance"
      description: workspace inventory, documentation health, coverage model and update guidance
  optional:
    - path: api/*.md
      pattern: true
      min_lines: 20
      description: API or route documentation when route signals exist
    - path: concepts/*.md
      pattern: true
      min_lines: 20
      description: implementation-side concept documentation

specs:
  required:
    - path: ../.specs/domain/monitoring-platform.md
      min_lines: 30
      must_contain:
        - "## 约束空间"
        - "## 状态模型"
      description: Domain Spec: durable, verifiable constraints
  optional:
    - path: ../.specs/domain/*.md
      pattern: true
      min_lines: 30
      description: additional Domain Specs

index:
  - path: ../AGENTS.md
    min_lines: 20
    must_contain:
      - "## 文档地图"
      - "## 关键约束"
    description: root AI entry, SSOT
  - path: ../CLAUDE.md
    min_lines: 20
    must_contain:
      - "## 文档地图"
      - "## 关键约束"
    description: synchronized copy of root AGENTS.md
  - path: ../beacon/AGENTS.md
    min_lines: 20
    must_contain:
      - "## 模块路径"
      - "## 开发命令"
    description: module AI entry, SSOT for this directory
  - path: ../beacon/CLAUDE.md
    min_lines: 20
    must_contain:
      - "## 模块路径"
      - "## 开发命令"
    description: synchronized copy of sibling AGENTS.md
  - path: ../beacon/web/AGENTS.md
    min_lines: 20
    must_contain:
      - "## 模块路径"
      - "## 开发命令"
    description: module AI entry, SSOT for this directory
  - path: ../beacon/web/CLAUDE.md
    min_lines: 20
    must_contain:
