version: '3'

vars:
  TARGET: collia
  SERVER: ./cmd/{{.TARGET}}
  VERSION:
    sh: cat VERSION

tasks:
  wire:
    desc: Generate Wire dependency injection code
    cmds:
      - wire ./service/

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -count=1 ./...

  amd64:
    desc: Build linux/amd64 collia binary
    env:
      CGO_ENABLED: '0'
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o {{.TARGET}} {{.SERVER}}

  arm64:
    desc: Build linux/arm64 collia binary
    deps:
      - wire
    env:
      CGO_ENABLED: '0'
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o {{.TARGET}} {{.SERVER}}
