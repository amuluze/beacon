version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install website frontend dependencies
    cmds:
      - pnpm install

  clean:
    desc: Remove local dependencies and lockfile
    cmds:
      - rm -rf node_modules pnpm-lock.yaml

  dev:
    desc: Install dependencies and run website frontend dev server
    deps:
      - install
    cmds:
      - pnpm run dev

  build:
    desc: Install dependencies and build website frontend
    deps:
      - install
    cmds:
      - pnpm run build
