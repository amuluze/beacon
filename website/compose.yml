services:
  beacon:
    image: registry.cn-hangzhou.aliyuncs.com/amuluze/beacon-help:latest
    container_name: beacon
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # 留空：SPA 在浏览器中通过相对路径走同源 nitro 代理到后端，
      # 避免 localhost:3000 指向用户本机导致请求失败。
      NUXT_PUBLIC_BASE_URL: ""
      APP_ENV: production
    volumes:
      - official-data:/app/data
      - official-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  official-data:
  official-logs:
