[App]
Env = "production"                                  # 运行环境：dev / production
CORSAllowOrigins = ["https://help.beacon.amuluze.com"] # 允许的跨域来源

[Fiber]
Host = "0.0.0.0"       # http监听地址
Port = 8000            # http监听端口
ShutdownTimeout = 30   # http优雅关闭等待超时时长(单位秒)
SeverHeader = "server"
AppName = "server"
Prefork = false

[Gorm]
Debug = false            # 是否开启调试模式（生产关闭，避免打印 SQL）
DBType = "sqlite"        # 数据库类型(目前支持的数据库类型：postgres, sqlite)
MaxLifetime = 7200       # 设置连接可以重用的最长时间(单位：秒)
MaxOpenConns = 150       # 设置数据库的最大打开连接数
MaxIdleConns = 50        # 设置空闲连接池中的最大连接数
TablePrefix = "s_"       # 数据库表名前缀
EnableAutoMigrate = true # 是否启用自动映射数据库表结构

[DB]
Host = ""                 # 连接地址
Port = ""                 # 连接端口
User = ""                 # 用户名
Password = ""             # 密码
DBName = "/app/statistic" # 数据库
SSLMode = ""              # SSL模式

[Log]
Output = "/app/logs/server.log" # 日志存放路径
Level = "info"                  # 日志等级
Rotation = 1                    # 每天切分一个日志文件
MaxAge = 7

[Release]
Dir = "/app/release" # 发布物静态资源根目录，对外暴露在 /release/* 路径下
